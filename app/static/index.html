<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <title>hap</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/static/icon-192.png">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
  <div id="conn-banner" class="conn-banner" hidden>⚠ Connection lost — reconnecting…</div>

  <!-- Login -->
  <section id="view-login" class="view" hidden>
    <form id="login-form" class="login-card">
      <h1>hap</h1>
      <p class="muted">Enter your PIN or access token</p>
      <input id="login-secret" type="password" inputmode="text" autocomplete="off"
             placeholder="PIN or token" aria-label="PIN or token">
      <button type="submit">Unlock</button>
      <p id="login-error" class="error" hidden></p>
    </form>
  </section>

  <!-- Conversation list -->
  <section id="view-list" class="view" hidden>
    <header class="topbar">
      <span class="title">Conversations</span>
      <button id="logout-btn" class="link" title="Log out">Log out</button>
    </header>
    <div id="conversation-list" class="list"></div>
    <form id="new-form" class="new-bar">
      <input id="new-agent" list="agent-options" placeholder="agent (e.g. betty)">
      <datalist id="agent-options"></datalist>
      <input id="new-body" placeholder="first message…" autocomplete="off">
      <button type="submit">Start</button>
    </form>
  </section>

  <!-- Conversation view -->
  <section id="view-convo" class="view" hidden>
    <header class="topbar">
      <button id="back-btn" class="link">‹ Back</button>
      <span id="convo-title" class="title"></span>
      <span id="convo-status" class="status"></span>
      <span class="spacer"></span>
    </header>
    <div id="messages" class="messages"></div>
    <form id="send-form" class="send-bar">
      <input id="send-body" placeholder="Message…" autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
